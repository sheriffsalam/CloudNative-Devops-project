apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-1
  labels:
    app: service-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-1
  template:
    metadata:
      labels:
        app: service-1
      annotations:
        # These lines tell Dapr to attach itself to your service
        dapr.io/enabled: "true"
        dapr.io/app-id: "service-1"
        dapr.io/app-port: "8000"
    spec:
      containers:
      - name: service-1
        image: service-1:latest
        imagePullPolicy: Never
        # --- Add these Probes ---
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: service-1
spec:
  selector:
    app: service-1
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000